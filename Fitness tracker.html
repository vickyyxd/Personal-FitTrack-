<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; img-src 'none'; connect-src 'none'; font-src 'none';">
<title>💪 Vicky's Fitness Tracker</title>
<style>
:root {
  --bg:#0f1117; --surface:#181c27; --card:#1e2335; --border:#2a3050;
  --text:#e8eaf0; --muted:#7a84a0; --dim:#4a5280;
  --green:#4ade80; --blue:#60a5fa; --orange:#f97316;
  --purple:#c084fc; --yellow:#facc15; --red:#f87171;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,'Segoe UI',sans-serif;font-size:15px;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--surface);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* LAYOUT */
#app{display:flex;flex-direction:column;height:100vh;}
#header{background:linear-gradient(135deg,#0f1117,#1a1f35);border-bottom:1px solid var(--border);padding:16px 16px 0;flex-shrink:0;}
#header h1{font-size:1.15rem;font-weight:800;letter-spacing:-0.02em;margin-bottom:6px;}
#header h1 span{color:var(--green);}
.day-badge{display:inline-flex;align-items:center;gap:6px;font-size:0.72rem;font-weight:700;padding:4px 10px;border-radius:20px;background:rgba(255,255,255,0.05);border:1px solid var(--border);margin-bottom:10px;}
.tabs{display:flex;gap:3px;overflow-x:auto;scrollbar-width:none;padding-bottom:1px;}
.tabs::-webkit-scrollbar{display:none;}
.tab-btn{flex-shrink:0;padding:8px 13px;border-radius:8px 8px 0 0;border:1px solid transparent;border-bottom:none;background:transparent;color:var(--muted);cursor:pointer;font-size:0.75rem;font-weight:700;font-family:inherit;transition:all 0.15s;white-space:nowrap;}
.tab-btn.active{background:var(--card);color:var(--green);border-color:var(--border);}
.tab-btn:hover:not(.active){color:var(--text);background:rgba(255,255,255,0.04);}

#content{flex:1;overflow-y:auto;padding:14px;}
.panel{max-width:640px;margin:0 auto;display:none;}
.panel.active{display:block;}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:15px;margin-bottom:12px;}
.card.highlight{border-color:rgba(74,222,128,0.3);background:linear-gradient(135deg,#1a1f35,#1e2540);}
.section-label{font-size:0.62rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--dim);font-weight:700;margin-bottom:10px;}

/* CHECK ITEMS */
.check-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;cursor:pointer;margin-bottom:5px;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.02);transition:all 0.15s;user-select:none;}
.check-item:hover{background:rgba(255,255,255,0.04);}
.check-item.done{background:rgba(74,222,128,0.05);border-color:rgba(74,222,128,0.2);}
.check-item.done .ci-label{text-decoration:line-through;color:var(--muted);}
.check-box{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.15s;background:transparent;}
.check-item.done .check-box{background:var(--green);border-color:var(--green);}
.check-box svg{display:none;}
.check-item.done .check-box svg{display:block;}
.ci-label{font-size:0.83rem;font-weight:600;color:var(--text);}
.ci-sub{font-size:0.7rem;color:var(--dim);margin-top:2px;}

/* ACCENT COLORS FOR CHECKS */
.check-item.acc-orange.done{background:rgba(249,115,22,0.06);border-color:rgba(249,115,22,0.25);}
.check-item.acc-orange.done .check-box{background:var(--orange);border-color:var(--orange);}
.check-item.acc-purple.done{background:rgba(192,132,252,0.06);border-color:rgba(192,132,252,0.25);}
.check-item.acc-purple.done .check-box{background:var(--purple);border-color:var(--purple);}

/* PROGRESS RINGS */
.rings-row{display:flex;justify-content:space-around;align-items:center;padding:12px 0;}
.ring-wrap{display:flex;flex-direction:column;align-items:center;gap:5px;}
.ring-label{font-size:0.6rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);font-weight:700;}

/* WATER */
.water-grid{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px;}
.water-btn{width:36px;height:36px;border-radius:8px;border:2px solid var(--border);background:rgba(255,255,255,0.02);font-size:1rem;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;}
.water-btn.filled{border-color:var(--blue);background:rgba(96,165,250,0.18);}
.water-hint{font-size:0.7rem;color:var(--dim);margin-top:8px;}

/* NOTES */
.notes-area{width:100%;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:inherit;font-size:0.82rem;padding:11px;resize:vertical;min-height:85px;outline:none;transition:border-color 0.2s;}
.notes-area:focus{border-color:rgba(74,222,128,0.4);}

/* CALENDAR */
.cal-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.cal-nav-btn{background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--text);padding:6px 13px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:0.78rem;transition:background 0.15s;}
.cal-nav-btn:hover{background:rgba(255,255,255,0.1);}
.cal-nav-title{font-weight:700;font-size:0.85rem;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
.cal-day-name{text-align:center;font-size:0.6rem;font-weight:700;color:var(--dim);padding-bottom:5px;}
.cal-cell{text-align:center;padding:8px 3px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,0.02);}
.cal-cell.today{border-color:rgba(74,222,128,0.4);background:rgba(74,222,128,0.06);}
.cal-date{font-size:0.72rem;font-weight:700;color:var(--text);}
.cal-cell.today .cal-date{color:var(--green);}
.cal-emoji{font-size:0.6rem;margin:3px 0;}
.cal-donut{width:28px;height:28px;margin:0 auto;position:relative;}
.cal-legend{display:flex;flex-wrap:wrap;justify-content:center;gap:12px;margin-top:12px;}
.cal-legend-item{display:flex;align-items:center;gap:5px;font-size:0.65rem;color:var(--muted);}
.cal-legend-dot{width:9px;height:9px;border-radius:50%;}

/* WEEK SUMMARY */
.week-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
.week-row:last-child{border-bottom:none;}
.week-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
.week-bar-wrap{flex:1;}
.week-bar-label{font-size:0.78rem;font-weight:700;margin-bottom:5px;}
.week-bar-track{height:5px;background:var(--surface);border-radius:3px;overflow:hidden;}
.week-bar-fill{height:100%;border-radius:3px;transition:width 0.4s;}
.week-pct{font-size:0.78rem;font-weight:700;min-width:34px;text-align:right;font-variant-numeric:tabular-nums;}

/* EXERCISES TAB */
.ex-type-header{font-size:0.72rem;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;padding:8px 0 6px;margin-top:4px;}
.ex-row{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
.ex-row:last-child{border-bottom:none;}
.ex-num{width:26px;height:26px;border-radius:6px;background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:800;color:var(--muted);flex-shrink:0;}
.ex-name{font-size:0.83rem;font-weight:700;}
.ex-detail{font-size:0.7rem;color:var(--dim);margin-top:2px;}
.rule-row{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:0.78rem;}
.rule-row:last-child{border-bottom:none;}
.rule-cond{flex:1;color:var(--text);}
.rule-action{color:var(--muted);text-align:right;}

/* DIET TAB */
.diet-day-card{margin-bottom:10px;}
.diet-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;}
.diet-day-title{font-weight:700;font-size:0.88rem;}
.diet-macros{display:flex;gap:8px;}
.diet-macro{font-size:0.68rem;font-variant-numeric:tabular-nums;}
.meal-row{display:flex;gap:9px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.03);font-size:0.76rem;align-items:baseline;}
.meal-row:last-child{border-bottom:none;}
.meal-time{color:var(--dim);min-width:56px;font-size:0.67rem;flex-shrink:0;}
.meal-name{flex:1;color:var(--text);}
.meal-p{color:var(--muted);font-size:0.67rem;min-width:38px;text-align:right;flex-shrink:0;}

/* SUPPS TAB */
.supp-card{margin-bottom:11px;border-left-width:3px!important;border-left-style:solid!important;}
.supp-header{display:flex;align-items:center;gap:11px;margin-bottom:11px;}
.supp-icon{font-size:1.7rem;}
.supp-name{font-weight:800;font-size:0.93rem;}
.supp-brand{font-size:0.7rem;color:var(--muted);margin-top:2px;}
.supp-detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:11px;}
.supp-detail-item{background:var(--surface);border-radius:8px;padding:8px 10px;}
.supp-detail-lbl{font-size:0.6rem;color:var(--dim);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:3px;}
.supp-detail-val{font-size:0.78rem;font-weight:600;color:var(--text);}
.supp-two-col{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:10px;}
.supp-col-title{font-size:0.62rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:6px;}
.supp-col-item{font-size:0.73rem;color:var(--muted);margin-bottom:4px;line-height:1.4;}
.supp-schedule-row{display:flex;gap:9px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04);flex-wrap:wrap;}
.supp-schedule-row:last-child{border-bottom:none;}
.supp-time{font-size:0.7rem;color:var(--purple);min-width:56px;flex-shrink:0;font-weight:700;}
.supp-what{font-size:0.8rem;font-weight:700;}
.supp-when{font-size:0.68rem;color:var(--dim);margin-top:2px;}

/* PROGRESS TAB */
.big-number{font-size:2.4rem;font-weight:800;color:var(--green);font-variant-numeric:tabular-nums;line-height:1;}
.bar-chart-row{display:flex;justify-content:center;gap:5px;margin-top:14px;flex-wrap:wrap;}
.bar-col{text-align:center;}
.bar-day{font-size:0.6rem;color:var(--dim);margin-bottom:4px;}
.bar-track{width:30px;height:58px;background:var(--surface);border-radius:4px;position:relative;overflow:hidden;margin:0 auto;}
.bar-fill{position:absolute;bottom:0;left:0;right:0;border-radius:4px;transition:height 0.5s;}
.bar-pct{font-size:0.58rem;color:var(--muted);margin-top:3px;}
.goal-row{display:flex;gap:9px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:0.8rem;align-items:flex-start;}
.goal-row:last-child{border-bottom:none;}
.goal-text{font-weight:600;color:var(--text);}
.goal-note{font-size:0.7rem;color:var(--dim);margin-top:2px;}
.note-entry{padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
.note-entry:last-child{border-bottom:none;}
.note-entry-day{font-size:0.68rem;color:var(--dim);font-weight:700;margin-bottom:4px;}
.note-entry-text{font-size:0.8rem;color:var(--text);}
.empty-note{font-size:0.78rem;color:var(--dim);text-align:center;padding:12px;}

/* REST DAY */
.rest-card{text-align:center;padding:28px 16px;}
.rest-emoji{font-size:2.2rem;margin-bottom:8px;}
.rest-title{font-weight:700;font-size:1rem;}
.rest-sub{font-size:0.78rem;color:var(--muted);margin-top:4px;}

/* UTILITY */
.mt4{margin-top:4px;} .mt8{margin-top:8px;} .mt12{margin-top:12px;} .mt14{margin-top:14px;}
.flex{display:flex;} .flex-col{flex-direction:column;} .items-center{align-items:center;}
.gap8{gap:8px;} .flex1{flex:1;} .fw700{font-weight:700;}
</style>
</head>

      <button class="tab-btn" onclick="switchTab('supplements')">Supplements</button>
      <button class="tab-btn" onclick="switchTab('progress')">Progress</button>
    </div>
  </div>
  <div id="content">
    <div class="panel active" id="panel-today"></div>
    <div class="panel" id="panel-calendar"></div>

    <div class="panel" id="panel-diet"></div>

</div>

// ── STORAGE (safe wrappers) ───────────────────────────────────────────────────
const Store = {
  key(section, date) { return 'vf_' + section + '_' + date; },
  get(k) {
    try {
      const v = localStorage.getItem(k);
      if (!v) return null;
      return JSON.parse(v);
    } catch { return null; }
  },
  set(k, v) {
    try { localStorage.setItem(k, JSON.stringify(v)); } catch {}
  },
  getRaw(k) { try { return localStorage.getItem(k) || ''; } catch { return ''; } },
  setRaw(k, v) { try { localStorage.setItem(k, String(v).slice(0, 2000)); } catch {} }
};

// ── DATE HELPERS ──────────────────────────────────────────────────────────────
function todayStr() {
  const d = new Date();
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}
function pad(n) { return String(n).padStart(2,'0'); }
function getDayName(ds) {
  const d = new Date(ds+'T12:00:00');
  return DAYS[d.getDay()===0?6:d.getDay()-1];
}
function getWeekDates(offset) {
  offset = offset||0;
  const today = new Date();
  const mon = new Date(today);
  mon.setDate(today.getDate()-(today.getDay()===0?6:today.getDay()-1)+offset*7);
  return Array.from({length:7},(_,i)=>{
    const d = new Date(mon); d.setDate(mon.getDate()+i);
    return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
  });
}
function dateDay(ds) { return new Date(ds+'T12:00:00').getDate(); }
function monthLabel(dates) {
  const d = new Date(dates[0]+'T12:00:00');
  return d.toLocaleString('default',{month:'long',year:'numeric'});
}
function scoreColor(s) { return s>=80?'#4ade80':s>=50?'#facc15':'#f97316'; }

function getDayScore(ds) {
  const dn = getDayName(ds);
  const exs = EXERCISES[WORKOUTS[dn].label]||[];
  const ms = MEALS[dn]||[];
  const ed = Store.get(Store.key('ex',ds))||{};
  const md = Store.get(Store.key('meal',ds))||{};
  const sd = Store.get(Store.key('supp',ds))||{};
  const eDone = exs.filter(e=>ed[e.id]).length;
  const mDone = ms.filter(m=>md[m.id]).length;
  const sDone = SUPPS.filter(s=>sd[s.id]).length;
  const total = exs.length + ms.length + SUPPS.length;
  return total ? Math.round((eDone+mDone+sDone)/total*100) : 0;
}

// ── SVG HELPERS ───────────────────────────────────────────────────────────────
function ringHTML(pct, size, color) {
  const r=(size-8)/2, c=2*Math.PI*r;
  return '<svg width="'+size+'" height="'+size+'">'
    +'<circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" fill="none" stroke="#1e2335" stroke-width="6"/>'
    +'<circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="6"'
    +' stroke-dasharray="'+c+'" stroke-dashoffset="'+(c*(1-pct/100))+'"'
    +' stroke-linecap="round" transform="rotate(-90 '+size/2+' '+size/2+')"'
    +' style="transition:stroke-dashoffset 0.5s"/>'
    +'<text x="50%" y="50%" text-anchor="middle" dy="0.35em" fill="#e8eaf0" font-size="'+(size*0.21)+'" font-weight="700" font-family="monospace">'+pct+'%</text>'
    +'</svg>';
}
function donutHTML(pct, size) {
  const col = pct>=80?'#4ade80':pct>=50?'#facc15':pct>0?'#f97316':'#2a3050';
  const r=(size-5)/2, c=2*Math.PI*r;
  return '<svg width="'+size+'" height="'+size+'">'
    +'<circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" fill="none" stroke="#2a3050" stroke-width="4"/>'
    +(pct>0?'<circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" fill="none" stroke="'+col+'" stroke-width="4"'
      +' stroke-dasharray="'+c+'" stroke-dashoffset="'+(c*(1-pct/100))+'"'
      +' stroke-linecap="round" transform="rotate(-90 '+size/2+' '+size/2+')" />':'')
    +'</svg>';
}
function checkSVG() {
  return '<svg width="12" height="10" viewBox="0 0 12 10"><polyline points="1,5 4.5,8.5 11,1" stroke="#000" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>';
}

// ── CHECK ITEM BUILDER ────────────────────────────────────────────────────────
function buildCheckItem(id, label, sublabel, done, accent, onclick) {
  const div = document.createElement('div');
  div.className = 'check-item' + (accent?' acc-'+accent:'') + (done?' done':'');
  div.dataset.id = id;
  div.innerHTML =
    '<div class="check-box">'+checkSVG()+'</div>'
    +'<div class="flex1"><div class="ci-label"></div>'+(sublabel?'<div class="ci-sub"></div>':'')+'</div>';
  div.querySelector('.ci-label').textContent = label;
  if (sublabel) div.querySelector('.ci-sub').textContent = sublabel;
  div.addEventListener('click', onclick);
  return div;
}

// ── TAB SWITCHING ─────────────────────────────────────────────────────────────
let currentTab = 'today';
function switchTab(name) {
  currentTab = name;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{

    ['1:00 PM','Every day','🐟 Omega-3 1 cap','Lunch ke saath'],
    ['8:00 PM','Training days','🥛 Whey 1 scoop + ⚡ Creatine 3–5g','Post-gym 30 min']
  ].forEach(([time,when,what,note])=>{
    const row = document.createElement('div');
    row.className = 'supp-schedule-row';
    const t = document.createElement('div'); t.className='supp-time'; t.textContent=time;
    const info = document.createElement('div');
    const w = document.createElement('div'); w.className='supp-what'; w.textContent=what;
    const wn = document.createElement('div'); wn.className='supp-when'; wn.textContent=when+' · '+note;
    info.appendChild(w); info.appendChild(wn);
    row.appendChild(t); row.appendChild(info);
    sc.appendChild(row);
  });
  p.appendChild(sc);
}

// ── PROGRESS ──────────────────────────────────────────────────────────────────
function renderProgress() {
  const today = todayStr();
  const dates = getWeekDates(0);
  const p = document.getElementById('panel-progress');
  p.innerHTML = '';

  const sc = document.createElement('div');
  sc.className = 'card';
  sc.style.textAlign = 'center';
  sc.style.padding = '20px';
  const sicon = document.createElement('div'); sicon.style.fontSize='1.4rem'; sicon.style.marginBottom='6px'; sicon.textContent='📊';
  const stitle = document.createElement('div'); stitle.className='fw700'; stitle.style.marginBottom='4px'; stitle.textContent='Weekly Stats';
  sc.appendChild(sicon); sc.appendChild(stitle);

  let total=0, tracked=0;
  const scores = dates.map(d=>{ const s=getDayScore(d); if(d<=today){total+=s;tracked++;} return s; });
  const avg = tracked ? Math.round(total/tracked) : 0;

  const bn = document.createElement('div');
  bn.className = 'big-number';
  bn.textContent = avg+'%';
  const bsub = document.createElement('div');
  bsub.style.cssText = 'font-size:0.76rem;color:var(--muted);margin-top:4px;';
  bsub.textContent = 'Average completion this week';
  sc.appendChild(bn); sc.appendChild(bsub);

  const bcRow = document.createElement('div');
  bcRow.className = 'bar-chart-row';
  dates.forEach((d,i)=>{
    const s = scores[i];
    const isFuture = d > today;
    const col = document.createElement('div');
    col.className = 'bar-col';
    const dl = document.createElement('div'); dl.className='bar-day'; dl.textContent=DAYS[i];
    const track = document.createElement('div'); track.className='bar-track';
    if (!isFuture) {
      const fill = document.createElement('div');
      fill.className = 'bar-fill';
      fill.style.cssText = 'height:'+s+'%;background:'+scoreColor(s)+';';
      track.appendChild(fill);
    }
    const pct = document.createElement('div'); pct.className='bar-pct'; pct.textContent=isFuture?'—':s+'%';
    col.appendChild(dl); col.appendChild(track); col.appendChild(pct);
    bcRow.appendChild(col);
  });
  sc.appendChild(bcRow);
  p.appendChild(sc);

  const gc = document.createElement('div');
  gc.className = 'card';
  const gl = document.createElement('div'); gl.className='section-label'; gl.textContent='🎯 Month 1 Goals';
  gc.appendChild(gl);
  [
    ['Learn all 18 exercise forms','Form pe focus — weight baad mein'],
    ['Complete 24/24 sessions','6 days × 4 weeks'],
    ['Hit 90–100g protein daily','Har meal mein protein'],
    ['3–4L water daily','Creatine ke liye zaroori'],
    ['Gain 0.5–1kg bodyweight','Muscle gain slow hota hai — patience rakho'],
    ['Week 4 deload complete karo','Recovery = growth']
  ].forEach(([goal,note])=>{
    const row = document.createElement('div');
    row.className = 'goal-row';
    const ico = document.createElement('div'); ico.style.cssText='color:#4ade80;font-size:0.9rem;flex-shrink:0;'; ico.textContent='🎯';
    const info = document.createElement('div');
    const gt = document.createElement('div'); gt.className='goal-text'; gt.textContent=goal;
    const gn = document.createElement('div'); gn.className='goal-note'; gn.textContent=note;
    info.appendChild(gt); info.appendChild(gn);
    row.appendChild(ico); row.appendChild(info);
    gc.appendChild(row);
  });
  p.appendChild(gc);

  const nc = document.createElement('div');
  nc.className = 'card';
  const nl = document.createElement('div'); nl.className='section-label'; nl.textContent='📝 Week Notes';
  nc.appendChild(nl);
  let hasNotes = false;
  dates.filter(d=>d<=today).forEach(d=>{
    const note = Store.getRaw(Store.key('notes',d));
    if (!note) return;
    hasNotes = true;
    const dn = getDayName(d);
    const entry = document.createElement('div');
    entry.className = 'note-entry';
    const el = document.createElement('div'); el.className='note-entry-day'; el.textContent=WORKOUTS[dn].emoji+' '+dn+' · '+d;
    const et = document.createElement('div'); et.className='note-entry-text'; et.textContent=note;
    entry.appendChild(el); entry.appendChild(et);
    nc.appendChild(entry);
  });
  if (!hasNotes) {
    const emp = document.createElement('div'); emp.className='empty-note';
    emp.textContent = 'Koi notes nahi abhi tak — Today tab mein likhte jao!';
    nc.appendChild(emp);
  }
  p.appendChild(nc);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
(function init() {
  const today = todayStr();
  const dn = getDayName(today);
  const wk = WORKOUTS[dn];
  const badge = document.getElementById('dayBadge');
  badge.textContent = wk.emoji+' '+dn+' — '+wk.label+' Day · '+new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short'});
  renderToday();
})();
</script>
